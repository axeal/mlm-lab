defaultNamespace: uyuni

labels:
  mlm-lab-bundle: uyuni-server

dependsOn:
  - selector:
      matchLabels:
        mlm-lab-bundle: uyuni-bootstrap
  - selector:
      matchLabels:
        mlm-lab-bundle: local-path-provisioner

helm:
  chart: "oci://registry.opensuse.org/systemsmanagement/uyuni/master/charts/uyuni/server-helm"
  version: 2026.4.0
  releaseName: uyuni
  values:
    repository: registry.opensuse.org/systemsmanagement/uyuni/master/containerfile/uyuni

    global:
      fqdn: ${ get .ClusterLabels "uyuni-fqdn" }

    ingress:
      type: traefik
      class: traefik

    server:
      superPrivileged: true

    tftp:
      enable: false
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: uyuni
    namespace: uyuni
    operations:
      # This ignores the entire volumes list during comparison
      - {"op": "remove", "path": "/spec/template/spec/volumes"}
