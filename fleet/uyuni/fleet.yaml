defaultNamespace: uyuni

labels:
  mlm-lab-bundle: uyuni-bootstrap

dependsOn:
  - selector:
      matchLabels:
        mlm-lab-bundle: cert-manager
  - selector:
      matchLabels:
        mlm-lab-bundle: trust-manager

helm:
  releaseName: uyuni-bootstrap
  values:
    credentials:
      db:
        admin:
          password: admin
        internal:
          password: admin
        reportdb:
          password: admin
      admin:
        password: admin

    global:
      fqdn: "${clusterLabels.mlm-hostname}"
